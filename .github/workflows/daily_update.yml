name: Daily whale shark risk update

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("mgcv", "readr", "dplyr", "tibble", "maxnet"), repos="https://cloud.r-project.org")'

      - name: Make net master
        run: |
          python scripts/make_net_master.py

      - name: Update daily environment
        run: |
          python scripts/update_daily_env.py

      - name: Predict risk
        run: |
          Rscript scripts/predict_risk.R

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/net_master.csv outputs/current_env.csv outputs/latest_risk.csv outputs/update_log.csv outputs/model_metrics.csv
          git commit -m "Daily whale shark risk update" || echo "No changes to commit"
          git push
