name: Daily whale shark risk update

on:
  schedule:
    # JST 06:00 = UTC 21:00
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-risk:
    runs-on: ubuntu-latest

    env:
      CMEMS_USERNAME: ${{ secrets.CMEMS_USERNAME }}
      CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("mgcv", "readr", "dplyr", "tibble", "maxnet"), repos="https://cloud.r-project.org")'

      - name: Make net master
        run: |
          python scripts/make_net_master.py

      - name: Update Kuroshio axis from JCG
        run: |
          python scripts/update_kuroshio_axis_from_jcg.py

      - name: Add Kuroshio distance
        run: |
          python scripts/add_kuroshio_distance.py

      - name: Make seasonal forecast environment
        run: |
          python scripts/update_forecast_env.py

      - name: Update forecast environment with Copernicus
        run: |
          python scripts/update_forecast_env_with_copernicus.py

      - name: Predict forecast risk
        run: |
          Rscript scripts/predict_forecast_risk.R

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git rm -r --cached data/raw_copernicus_forecast || true
          git rm -r --cached data/raw_kuroshio || true
          git rm --cached "*.nc" || true

          git add .github/workflows/daily_update.yml
          git add requirements.txt
          git add .gitignore

          git add data/kuroshio_axis.csv
          git add data/net_master.csv

          git add outputs/current_env.csv
          git add outputs/latest_risk.csv
          git add outputs/forecast_env.csv
          git add outputs/forecast_risk.csv
          git add outputs/model_metrics.csv
          git add outputs/update_log.csv || true

          git commit -m "Daily whale shark risk update" || echo "No changes to commit"
          git push
